version: '3.8'


services:
  mysql_source:
    image: mysql:8.0
    container_name: mysql_source
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - fuzzy_net


  dagster_app:
    build: .
    container_name: dagster_app
    restart: always
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - MYSQL_HOST=mysql_source
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - BQ_PROJECT_ID=${BQ_PROJECT_ID}
      - BQ_DATASET=${BQ_DATASET}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
    volumes:
      - .:/opt/dagster/app
      - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml
      - ./dagster_home:/opt/dagster/dagster_home
      - ./bq_key.json:/opt/dagster/app/bq_key.json
    ports:
      - "3000:3000"
    entrypoint: ["dagster-webserver", "-h", "0.0.0.0", "-p", "3000", "-w", "workspace.yaml"]
    depends_on:
      mysql_source:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - fuzzy_net


  dagster_daemon:
    build: .
    command: dagster-daemon run
    restart: always
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home
    volumes:
      - .:/opt/dagster/app
      - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml
      - ./dagster_home:/opt/dagster/dagster_home
    env_file:
      - .env
    depends_on:
      - dagster_app
    deploy:
      resources:
        limits: 
          memory: 512M


networks:
  fuzzy_net:
    driver: bridge
