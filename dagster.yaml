storage:
  postgres:
    postgres_db:
      hostname: postgres_db
      username: dagster_user
      password: dagster_password
      db_name: dagster_db
      port: 5432

run_coordinator:
  module: dagster._core.run_coordinator
  class: DefaultRunCoordinator

scheduler:
  module: dagster._core.scheduler
  class: DagsterDaemonScheduler

telemetry:
  enabled: false