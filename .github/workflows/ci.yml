name: Fuzzy Pipeline CI 


on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:
  quality-and-security-check:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout code
        uses: actions/checkout@v3


      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'


      - name: Security check
        run: |
          if [ -f "bq_key.json" ] || [ -f ".env" ]; then
            echo "Phát hiện file nhảy cảm được commit. Hãy xóa chúng và thêm vào .gitignore"
            exit 1
          fi 

      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 


      - name: Lint with flake8
        run: |
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      

      - name: dbt check
        env:
          BQ_PROJECT_ID: fake-project
          BQ_DATASET: fake_dataset  
        run: |
          cd fuzzy_dbt
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          fuzzy_dbt:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: fake-project
                dataset: fake_dataset
                threads: 1
                keyfile: fake_key.json
          EOF
          dbt deps
          dbt parse



      - name: Verify Dagster code
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          python -W ignore -c "from pipeline import defs; print('Dagster Definitions hợp lệ')"







