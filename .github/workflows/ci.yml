name: Fuzzy Pipeline CI 

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  quality-and-security-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Security check
        run: |
          echo "Checking for sensitive files in git tree..."
          if git ls-files | grep -E "(bq_key\.json|\.env$)" | grep -v ".env_example"; then
            echo "FAILED: Phát hiện file nhạy cảm được commit. Xóa và thêm vào .gitignore"
            exit 1
          fi
          echo "Ko phát hiện file nhạy cảm"

      - name: set up python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: 3.11
          enable-cache: True

      - name: Install dependencies
        run: |
          uv sync --frozen

      - name: Lint with flake8
        run: |
          uv run flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          uv run flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/28912745518/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'dagster-bot@regal-cursor-482204-h6.iam.gserviceaccount.com'

      - name: dbt parse and compile
        run: |
          cd fuzzy_dbt
          uv run dbt deps
          mkdir -p /tmp/ci_profiles
          cat > /tmp/ci_profiles/profiles.yml << PROFILE
          fuzzy_dbt:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: oauth
                project: $BQ_PROJECT_ID
                dataset: $BQ_DATASET
                schema: $BQ_DATASET
                threads: 1
                location: US
          PROFILE
          uv run dbt deps --quiet
          uv run dbt parse --profiles-dir /tmp/ci_profiles
          uv run dbt compile --profiles-dir /tmp/ci_profiles --no-populate-cache
        env:
          BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
          BQ_DATASET: ${{ secrets.BQ_DATASET }}
 
      - name: Verify Dagster definitions
        run: |
          uv run python -W ignore -c "
          from pipeline import defs
          asset_count = len(defs.get_all_asset_specs())
          job_count = len(defs.jobs)
          schedule_count = len(defs.schedules)
          sensor_count = len(defs.sensors)
          print(f'Dagster Definitions hợp lệ')
          print(f'  Assets:    {asset_count}')
          print(f'  Jobs:      {job_count}')
          print(f'  Schedules: {schedule_count}')
          print(f'  Sensors:   {sensor_count}')
          "
        env:
          PYTHONPATH: src
          DAGSTER_HOME: /tmp/dagster_home
          MYSQL_ROOT_PASSWORD: fake
          MYSQL_DATABASE: fake
          MYSQL_USER: fake
          MYSQL_PASSWORD: fake
          AWS_ACCESS_KEY_ID: fake
          AWS_SECRET_ACCESS_KEY: fake
          AWS_REGION: us-east-1
          S3_BUCKET_NAME: fake-bucket
          BQ_PROJECT_ID: fake-project
          BQ_DATASET: fake_dataset
          GOOGLE_APPLICATION_CREDENTIALS: /dev/null
          MY_EMAIL: fake@fake.com
          APP_PASSWORD: fake







