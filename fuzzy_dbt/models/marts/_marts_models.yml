version: 2

models:
  - name: fct_overview_stats
    description: "Bảng tổng hợp chỉ số kinh doanh theo tháng"
    columns:
      - name: month
        tests:
          - unique
          - not_null
      - name: gross_revenue
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0