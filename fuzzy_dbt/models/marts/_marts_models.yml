version: 2

models:
  - name: mart_daily_orders
    description: "Bảng tổng hợp chỉ số kinh doanh theo ngày"
    columns:
      - name: order_date
        tests:
          - not_null
      - name: gross_revenue
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
  - name: mart_product_items
    description: "Bảng tổng hợp chỉ số kinh doanh theo sản phẩm theo thời gian"
    columns:
      - name: product_name
        tests:
          - not_null
      - name: item_gross_revenue
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
  - name: mart_traffic_summary
    description: "Bảng tổng hợp chỉ số traffic theo thời gian"
    columns:
      - name: device_type
        tests:
          - not_null
